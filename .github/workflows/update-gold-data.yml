name: Update Gold Price Data

on:
  schedule:
    # Run daily at 00:15 UTC (~6:00 AM NPT)
    - cron: '15 0 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest gold price data
        run: node scripts/update-daily-data.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/historical-gold-data.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: update gold prices $(date -u +%Y-%m-%d)"
          git push
